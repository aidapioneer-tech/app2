name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm generate
        env:
          NUXT_PUBLIC_SITE_URL: ${{ vars.NUXT_PUBLIC_SITE_URL }}
          NUXT_APP_BASE_URL: ${{ vars.NUXT_APP_BASE_URL }}

      - name: Validate build output
        run: |
          test -d .output/public && [ "$(ls -A .output/public)" ] || (echo "Build output is empty" && exit 1)

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Backup previous version
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            ${{ secrets.SSH_DEPLOY_USER }}@${{ secrets.SSH_DEPLOY_HOST }} \
            "if [ -d ${{ secrets.SSH_DEPLOY_PATH }} ]; then mkdir -p ${{ secrets.SSH_DEPLOY_PATH }}-backup && cp -a ${{ secrets.SSH_DEPLOY_PATH }}/. ${{ secrets.SSH_DEPLOY_PATH }}-backup/; fi"

      - name: Deploy
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            .output/public/ \
            ${{ secrets.SSH_DEPLOY_USER }}@${{ secrets.SSH_DEPLOY_HOST }}:${{ secrets.SSH_DEPLOY_PATH }}/

      - name: Smoke test
        run: |
          curl -fsS --max-time 15 --retry 3 --retry-delay 5 \
            "${{ vars.NUXT_PUBLIC_SITE_URL }}${{ vars.NUXT_APP_BASE_URL }}/" > /dev/null

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
