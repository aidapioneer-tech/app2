name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # pnpm/action-setup ещё не имеет релиза на Node.js 24 — форсируем,
      # чтобы убрать предупреждение об устаревшем Node.js 20.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm generate
        env:
          NUXT_PUBLIC_SITE_URL: ${{ vars.NUXT_PUBLIC_SITE_URL }}
          NUXT_APP_BASE_URL: ${{ vars.NUXT_APP_BASE_URL }}

      - name: Validate build output
        run: |
          test -d .output/public && [ "$(ls -A .output/public)" ] || (echo "Build output is empty" && exit 1)

      - name: Setup SSH
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Backup previous version
        env:
          DEPLOY_USER: ${{ secrets.SSH_DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.SSH_DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -p 7222 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "if [ -d '$DEPLOY_PATH' ]; then mkdir -p '$DEPLOY_PATH-backup' && cp -a '$DEPLOY_PATH/.' '$DEPLOY_PATH-backup/'; fi"

      - name: Deploy
        env:
          DEPLOY_USER: ${{ secrets.SSH_DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.SSH_DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p 7222" \
            .output/public/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Smoke test
        env:
          SITE_URL: ${{ vars.NUXT_PUBLIC_SITE_URL }}
          BASE_URL: ${{ vars.NUXT_APP_BASE_URL }}
        run: |
          url="${SITE_URL}${BASE_URL}/"
          # Проверяем доступность (HTTP 2xx через -f) и что отдаётся именно
          # HTML, а не заглушка/пустой ответ хостинга.
          content_type=$(curl -fsS --max-time 15 --retry 3 --retry-delay 5 -o /dev/null -w '%{content_type}' "$url")
          echo "Content-Type: $content_type"
          echo "$content_type" | grep -qi 'text/html' || (echo "Ответ не HTML" && exit 1)

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
